function vacacaoAction(id,act){
  const v=(state.vacacoes||[]).find(x=>x.id===id);if(!v)return;
  if(act==="editar"){closeSheet();formVacacao(v);return;}
  if(act==="trocar"){v.trocada=!v.trocada;mark();closeSheet();render();toast(v.trocada?"Dia marcado como troca 🔄":"Troca desfeita");return;}
  if(act==="serie"){
    const serie=(state.velSeries||[]).find(s=>s.id===v.serieId);
    if(!serie){toast("Recorrência não encontrada","amber");return;}
    if(!confirm("Encerrar esta recorrência? As próximas vacações ainda agendadas serão removidas (as já realizadas ficam)."))return;
    serie.ativo=false;
    const hj=todayYmd();
    state.vacacoes=state.vacacoes.filter(x=>!(x.serieId===serie.id&&x.status==="agendada"&&x.data>hj));
    mark();closeSheet();render();toast("Recorrência encerrada");return;
  }
  if(act==="excluir"){if(!confirm("Excluir esta vacação?"))return;state.vacacoes=state.vacacoes.filter(x=>x.id!==id);mark();closeSheet();render();toast("Vacação excluída");return;}
  if(act==="realizada")v.status="realizada";
  if(act==="faltou"){v.status="faltou";v.pago=false;v.faltaCobrada=confirm("Cobrar esta falta da Velocity mesmo assim?\n\nOK = lança em « a receber » · Cancelar = não cobra");}
  if(act==="agendada"){v.status="agendada";v.pago=false;}
  if(act==="pago"){v.pago=true;v.dataPago=todayYmd();toast("Recebimento registrado ✓","green");}
  if(act==="naopago"){v.pago=false;v.dataPago=null;}
  mark();closeSheet();render();
}
function formVacacao(existing,pref){
  if(!state.vacacoes)state.vacacoes=[];
  if(!state.velocity)state.velocity={nome:"Velocity",valorPadrao:0};
  const units=velUnidades();
  const defUni=(pref&&pref.unidadeId)||units[0].id;
  const nome="Velocity";
  const defData=(pref&&pref.data)||((ui.agendaFilter==="hoje"&&ui.agendaDay)?ui.agendaDay:todayYmd());
  draft=existing?JSON.parse(JSON.stringify(existing)):{id:uid(),unidadeId:defUni,data:defData,hora:(pref&&pref.hora)||"18:00",dur:60,local:"",valor:velUnidade(defUni).valorPadrao||"",status:"agendada",pago:false};
  if(!draft.unidadeId)draft.unidadeId=defUni;
  const isEdit=!!existing;
  const dcur=Number(draft.dur)||60;
  const durOpts=[[30,"30 min"],[45,"45 min"],[60,"1 h"],[90,"1h30"],[120,"2 h"]].map(([v,l])=>`<option value="${v}" ${v===dcur?"selected":""}>${l}</option>`).join("");
  const body=`
    <div class="fld"><label>Unidade Velocity</label><select id="vUni">${units.map(u=>`<option value="${u.id}" ${draft.unidadeId===u.id?"selected":""}>Velocity ${esc(u.nome)}</option>`).join("")}</select></div>
    <div class="fld"><label>Data</label><input type="date" id="vData" value="${draft.data}"></div>
    <div class="frow">
      <div class="fld"><label>Início</label><input type="time" id="vHora" value="${draft.hora}"></div>
      <div class="fld"><label>Duração</label><select id="vDur">${durOpts}</select></div>
    </div>
    <div class="fld"><label>Valor da vacação (R$)</label><input id="vVal" inputmode="decimal" value="${draft.valor||""}" placeholder="Ex: 70"></div>
    <div class="fld"><label>Local <span class="opt">(opcional)</span></label><input id="vLocal" value="${esc(draft.local||"")}" placeholder="Ex: ${esc(nome)} — unidade Centro"></div>
    ${!isEdit?`<div class="fld"><label>Repetir toda semana</label>
      <select id="vRep"><option value="0">Não repetir</option><option value="always">Sempre (horário fixo) 🔁</option><option value="4">Por 4 semanas</option><option value="8">Por 8 semanas</option><option value="12">Por 12 semanas</option></select>
      <div class="hint">« Sempre » mantém o horário fixo da Velocity e cria as próximas semanas automaticamente.</div></div>`:""}
  `;
  const foot=`<button class="btn btn-primary" id="saveVac">${isEdit?"Salvar":"Agendar vacação"}</button>`;
  openSheet(isEdit?"Editar vacação":`Nova vacação ${nome}`,body,foot);
  document.getElementById("saveVac").onclick=()=>{
    draft.data=document.getElementById("vData").value;
    draft.hora=document.getElementById("vHora").value;
    draft.dur=Number(document.getElementById("vDur").value)||60;
    draft.valor=Number(document.getElementById("vVal").value)||0;
    draft.local=document.getElementById("vLocal").value.trim();
    draft.unidadeId=(document.getElementById("vUni")||{}).value||draft.unidadeId;
    if(!draft.data){toast("Escolha a data","amber");return;}
    const uni=velUnidade(draft.unidadeId);if(uni&&uni.id!=="_def")uni.valorPadrao=draft.valor; // lembra o valor por unidade
    const idx=state.vacacoes.findIndex(x=>x.id===draft.id);
    if(idx>=0)state.vacacoes[idx]=draft;
    else{
      const repVal=(document.getElementById("vRep")||{}).value||"0";
      if(repVal==="always"){
        const serie={id:uid(),unidadeId:draft.unidadeId,hora:draft.hora,dur:draft.dur,valor:draft.valor,local:draft.local||"",desde:draft.data,ativo:true};
        if(!state.velSeries)state.velSeries=[];
        state.velSeries.push(serie);
        ensureVelSerie(serie);
      }else{
        const rep=Number(repVal)||0;
        const base=parseYmd(draft.data);
        for(let i=0;i<=rep;i++){
          const d=new Date(base);d.setDate(base.getDate()+i*7);
          state.vacacoes.push({id:uid(),unidadeId:draft.unidadeId,data:ymdOf(d),hora:draft.hora,dur:draft.dur,valor:draft.valor,local:draft.local,status:"agendada",pago:false});
        }
      }
    }
    mark();closeSheet();ui.tab="agenda";setTab("agenda");render();toast(isEdit?"Vacação salva ✓":"Vacação agendada ✓","green");
  };
}

function formAula(existing,pref){
  const ativos=state.alunos.filter(a=>a.ativo!==false);
  if(!ativos.length){toast("Cadastre um aluno primeiro","amber");formAluno(null);return;}
  const defData=(pref&&pref.data)||((ui.agendaFilter==="hoje"&&ui.agendaDay)?ui.agendaDay:todayYmd());
  draft=existing?JSON.parse(JSON.stringify(existing)):{id:uid(),alunoId:ativos[0].id,data:defData,hora:(pref&&pref.hora)||"07:00",dur:60,status:"agendada",pago:false,valor:0,local:ativos[0].local||"",repetir:0};
  const isEdit=!!existing;
  const dcur=Number(draft.dur)||60;
  const durOpts=[[30,"30 min"],[45,"45 min"],[60,"1 h"],[90,"1h30"],[120,"2 h"]].map(([v,l])=>`<option value="${v}" ${v===dcur?"selected":""}>${l}</option>`).join("");
  const body=`
    <div class="fld"><label>Aluno</label><select id="aAluno">${ativos.map(a=>`<option value="${a.id}" ${draft.alunoId===a.id?"selected":""}>${esc(a.nome)} (${a.tipo})</option>`).join("")}</select></div>
    <div class="fld"><label>Data</label><input type="date" id="aData" value="${draft.data}"></div>
    <div class="frow">
      <div class="fld"><label>Início</label><input type="time" id="aHora" value="${draft.hora}"></div>
      <div class="fld"><label>Duração</label><select id="aDur">${durOpts}</select></div>
    </div>
    <div class="fld"><label>Local <span class="opt">(opcional)</span></label><input id="aLocal" value="${esc(draft.local||"")}" placeholder="Ex: Academia, casa do aluno, parque..."></div>
    ${!isEdit?`<div class="fld"><label>Repetir toda semana</label>
      <select id="aRep"><option value="0">Não repetir</option><option value="always">Sempre (horário fixo) 🔁</option><option value="4">Por 4 semanas</option><option value="8">Por 8 semanas</option><option value="12">Por 12 semanas</option></select>
      <div class="hint">« Sempre » mantém o horário fixo e cria as próximas semanas automaticamente.</div></div>`:""}
    <div id="aValBlock"></div>
  `;
  const foot=`<button class="btn btn-primary" id="saveAula">${isEdit?"Salvar":"Agendar aula"}</button>`;
  openSheet(isEdit?"Editar aula":"Nova aula",body,foot);
  const renderVal=()=>{
    const al=aluno(document.getElementById("aAluno").value);
    document.getElementById("aValBlock").innerHTML = (al&&al.tipo==="avulso")
      ? `<div class="fld"><label>Valor desta aula (R$)</label><input id="aVal" inputmode="decimal" value="${draft.valor||al.valorAula||""}" placeholder="${al.valorAula||90}"></div>`
      : "";
  };
  renderVal();
  document.getElementById("aAluno").onchange=()=>{
    renderVal();
    const lo=document.getElementById("aLocal");const na=aluno(document.getElementById("aAluno").value);
    if(lo&&!lo.value.trim()&&na&&na.local)lo.value=na.local; // sugere o local padrão do aluno
  };
  document.getElementById("saveAula").onclick=()=>{
    draft.alunoId=document.getElementById("aAluno").value;
    draft.data=document.getElementById("aData").value;
    draft.hora=document.getElementById("aHora").value;
    draft.dur=Number(document.getElementById("aDur").value)||60;
    draft.local=document.getElementById("aLocal").value.trim();
    if(!draft.data){toast("Escolha a data","amber");return;}
    const al=aluno(draft.alunoId);
    if(al&&al.tipo==="avulso"){const v=document.getElementById("aVal");draft.valor=v?Number(v.value)||0:0;}
    let remarcou=false;
    const idx=state.aulas.findIndex(x=>x.id===draft.id);
    if(idx>=0){
      const orig=state.aulas[idx];
      if(orig.data!==draft.data||orig.hora!==draft.hora){
        draft.historico=draft.historico||[];
        draft.historico.push({de:{data:orig.data,hora:orig.hora},para:{data:draft.data,hora:draft.hora},em:todayYmd()});
        remarcou=true;
      }
      state.aulas[idx]=draft;
    }
    else{
      const repVal=(document.getElementById("aRep")||{}).value||"0";
      if(repVal==="always"){
        const serie={id:uid(),alunoId:draft.alunoId,hora:draft.hora,dur:draft.dur,local:draft.local||"",valor:draft.valor||0,desde:draft.data,ativo:true};
        if(!state.series)state.series=[];
        state.series.push(serie);
        ensureSerie(serie);
      }else{
        const rep=Number(repVal)||0;
        const base=parseYmd(draft.data);
        for(let i=0;i<=rep;i++){
          const d=new Date(base);d.setDate(base.getDate()+i*7);
          const ymd=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
          state.aulas.push({id:uid(),alunoId:draft.alunoId,data:ymd,hora:draft.hora,dur:draft.dur,status:"agendada",pago:false,valor:draft.valor||0,local:draft.local||""});
        }
      }
    }
    mark();closeSheet();ui.tab="agenda";setTab("agenda");render();toast(remarcou?"Aula remarcada ↪":(isEdit?"Aula salva ✓":"Aula agendada ✓"),"green");
  };
}

function emptyState(){
  const vu=defaultVelUnidades(70);
  return {alunos:[],aulas:[],eventos:[],pagamentos:[],series:[],vacacoes:[],velUnidades:vu,velSeries:defaultVelSeries(0,vu[0].id,vu[1].id),despesas:[],velocity:{nome:"Velocity",valorPadrao:0},config:{coachNome:(state.config&&state.config.coachNome)||"Richard",cidade:(state.config&&state.config.cidade)||"Rio"},changes:0};
}
function openConfig(){
  if(!state.config)state.config={coachNome:"Richard",cidade:"Rio"};
  const c=state.config;
  const body=`
    <div class="fld"><label>Seu nome (no cabeçalho)</label><input id="cfNome" value="${esc(c.coachNome||"")}" placeholder="Ex: Richard"></div>
    <div class="fld"><label>Cidade <span class="opt">(opcional)</span></label><input id="cfCidade" value="${esc(c.cidade||"")}" placeholder="Ex: Rio"></div>
    <div class="hint" style="margin:2px 0 14px">Aparece no topo: « ${esc(greeting())}, ${esc(c.coachNome||"Richard")} » e na data.</div>
    <div class="act red" id="cfReset"><div class="ai">♻️</div><div><div>Recomeçar do zero</div><div class="sub">Apaga alunos, aulas, despesas... (mantém as unidades Velocity)</div></div></div>
    <div class="hint" style="text-align:center;margin-top:14px;opacity:.7">Richard • Personal — versão ${APP_VERSION}</div>`;
  const foot=`<button class="btn btn-primary" id="cfSave">Salvar</button>`;
  openSheet("Configurações",body,foot);
  document.getElementById("cfSave").onclick=()=>{
    c.coachNome=document.getElementById("cfNome").value.trim()||"Richard";
    c.cidade=document.getElementById("cfCidade").value.trim();
    mark();closeSheet();render();toast("Configurações salvas ✓","green");
  };
  document.getElementById("cfReset").onclick=()=>{
    if(!confirm("Apagar TODOS os dados e recomeçar do zero? Faça um backup antes se quiser guardar."))return;
    if(!confirm("Tem certeza? Esta ação não pode ser desfeita."))return;
    state=emptyState();topUpVelSeries();save();closeSheet();ui.tab="agenda";setTab("agenda");render();toast("Dados reiniciados");
  };
}
function openVelUnidades(){
  const us=velUnidades();
  let body=`<div class="hint" style="margin:0 0 14px">Cada unidade tem sua cor e seu valor padrão. As vacações e horários fixos seguem a cor da unidade.</div>`;
  us.forEach(u=>{
    const nSer=(state.velSeries||[]).filter(s=>s.ativo&&s.unidadeId===u.id).length;
    body+=`<div class="act" data-vu="${u.id}"><div class="ai" style="background:${u.cor}22;color:${u.cor}">🟣</div><div style="flex:1"><div>Velocity ${esc(u.nome)}</div><div class="sub">${money(u.valorPadrao)} · ${nSer} horário(s) fixo(s)</div></div></div>`;
  });
  body+=`<button class="btn btn-ghost" id="vuAdd" style="margin-top:6px">＋ Nova unidade</button>`;
  openSheet("Unidades Velocity",body);
  document.getElementById("sheetBody").querySelectorAll("[data-vu]").forEach(b=>b.onclick=()=>formVelUnidade(b.dataset.vu));
  document.getElementById("vuAdd").onclick=()=>formVelUnidade(null);
}
function formVelUnidade(id){
  if(!Array.isArray(state.velUnidades)||!state.velUnidades.length)state.velUnidades=defaultVelUnidades((state.velocity&&state.velocity.valorPadrao)||0);
  const us=state.velUnidades;
  const u=id?us.find(x=>x.id===id):{id:uid(),nome:"",cor:VEL_CORES[us.length%VEL_CORES.length],valorPadrao:(state.velocity&&state.velocity.valorPadrao)||0};
  const isEdit=!!id;let cor=u.cor;
  const body=`
    <div class="fld"><label>Nome do local</label><input id="vuNome" value="${esc(u.nome)}" placeholder="Ex: Leblon, Botafogo, Centro..."></div>
    <div class="fld"><label>Valor padrão (R$)</label><input id="vuVal" inputmode="decimal" value="${u.valorPadrao||""}" placeholder="Ex: 70"></div>
    <div class="fld"><label>Cor</label><div class="color-pick" id="vuCor">${VEL_CORES.map(c=>`<div class="sw ${c.toLowerCase()===(u.cor||"").toLowerCase()?"on":""}" data-c="${c}" style="background:${c}"></div>`).join("")}</div></div>`;
  let foot=`<button class="btn btn-primary" id="vuSave">${isEdit?"Salvar":"Criar unidade"}</button>`;
  if(isEdit&&us.length>1)foot+=`<button class="btn btn-danger" id="vuDel" style="margin-top:8px">Excluir unidade</button>`;
  openSheet(isEdit?"Editar unidade":"Nova unidade",body,foot);
  document.getElementById("vuCor").querySelectorAll(".sw").forEach(s=>s.onclick=()=>{cor=s.dataset.c;document.getElementById("vuCor").querySelectorAll(".sw").forEach(x=>x.classList.remove("on"));s.classList.add("on");});
  document.getElementById("vuSave").onclick=()=>{
    const nome=document.getElementById("vuNome").value.trim();
    if(!nome){toast("Dê um nome ao local","amber");return;}
    const val=Number(document.getElementById("vuVal").value)||0;
    if(isEdit){const t=us.find(x=>x.id===u.id);t.nome=nome;t.cor=cor;t.valorPadrao=val;}
    else us.push({id:u.id,nome,cor,valorPadrao:val});
    mark();render();openVelUnidades();toast(isEdit?"Unidade salva ✓":"Unidade criada ✓","green");
  };
  const del=document.getElementById("vuDel");
  if(del)del.onclick=()=>{
    if(!confirm(`Excluir « Velocity ${u.nome} » ? As vacações e horários fixos desta unidade serão removidos.`))return;
    state.velUnidades=us.filter(x=>x.id!==u.id);
    state.velSeries=(state.velSeries||[]).filter(s=>s.unidadeId!==u.id);
    state.vacacoes=(state.vacacoes||[]).filter(v=>v.unidadeId!==u.id);
    mark();render();openVelUnidades();toast("Unidade excluída");
  };
}

    <div class="act grey" data-m="export"><div class="ai">💾</div><div><div>Fazer backup (JSON)</div></div></div>
    <div class="act grey" data-m="import"><div class="ai">📂</div><div><div>Restaurar backup</div></div></div>
    <div class="act grey" data-m="csv"><div class="ai">📊</div><div><div>Exportar CSV</div></div></div>
    <div class="act grey" data-m="config"><div class="ai">⚙️</div><div><div>Configurações</div></div></div>`;
  openSheet("Menu",body);
  document.getElementById("sheetBody").querySelectorAll("[data-m]").forEach(b=>b.onclick=()=>{
    const m=b.dataset.m;closeSheet();
    if(m==="aluno")formAluno(null);
    else if(m==="aula")formAula(null);

    else if(m==="despesa")formDespesa(null);

  });
}
function backupBlob(){state._appVersion=APP_VERSION;return JSON.stringify(state,null,2);}
function markBackupDone(){state.lastBackup=new Date().toISOString();state.changes=0;save();}
function exportJson(){
  const blob=new Blob([backupBlob()],{type:"application/json"});
  download(blob,`richard-backup-${todayYmd()}.json`);
  markBackupDone();renderBanner();toast("Backup salvo 💾","green");
}
async function shareBackup(){
  const data=backupBlob();const fname=`richard-backup-${todayYmd()}.json`;
  try{
    const file=new File([data],fname,{type:"application/json"});
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      await navigator.share({files:[file],title:"Backup Richard",text:"Cópia de segurança dos dados (Richard • Personal)"});
      markBackupDone();render();toast("Backup compartilhado 📤","green");return;
    }
  }catch(e){ if(e&&e.name==="AbortError")return; }
  exportJson(); // fallback: download
}
function exportCsv(){
  const head=["Data","Hora","Aluno","Tipo","Status","Valor","Pago"];
  const rows=state.aulas.slice().sort((a,b)=>(a.data+a.hora).localeCompare(b.data+b.hora)).map(a=>{
    const al=aluno(a.alunoId)||{};
    return [a.data,a.hora,al.nome||"",al.tipo||"",a.status,(al.tipo==="avulso"?a.valor:al.mensalidade)||"",a.pago?"Sim":"Não"];
  });
  const csv="﻿"+[head,...rows].map(r=>r.map(c=>{c=String(c);return /[",;\n]/.test(c)?'"'+c.replace(/"/g,'""')+'"':c;}).join(";")).join("\r\n");
  download(new Blob([csv],{type:"text/csv"}),`richard-aulas-${todayYmd()}.csv`);
  toast("CSV exportado 📊","green");
}
function handleImport(file){
  const r=new FileReader();
  r.onload=()=>{try{const s=JSON.parse(r.result);if(!s.alunos)throw 0;if(!confirm("Restaurar este backup? Os dados atuais serão substituídos."))return;state=migrate(s);topUpSeries();topUpVelSeries();save();render();toast("Backup restaurado ✓","green");}catch(e){toast("Arquivo inválido","amber");}};
  r.readAsText(file);
}
function download(blob,name){const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000);}

/* =====================================================================
   UI plumbing
   ===================================================================== */
let toastT;
function toast(msg,type){const t=document.getElementById("toast");t.textContent=msg;t.className="toast show"+(type?" "+type:"");clearTimeout(toastT);toastT=setTimeout(()=>t.className="toast",2000);}
function setTab(tab){ui.tab=tab;document.querySelectorAll(".nav button").forEach(b=>b.classList.toggle("active",b.dataset.tab===tab));document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));document.getElementById("page-"+tab).classList.add("active");document.getElementById("scroll").scrollTop=0;}

document.querySelectorAll(".nav button").forEach(b=>b.onclick=()=>{setTab(b.dataset.tab);render();});
document.getElementById("fab").onclick=()=>{ if(ui.tab==="alunos")formAluno(null); else if(ui.tab==="financeiro")formDespesa(null); else novoMenu(); };
document.getElementById("btnMenu").onclick=openMenu;
document.getElementById("sheetClose").onclick=closeSheet;
document.getElementById("sheetBg").onclick=closeSheet;
document.getElementById("fileInput").onchange=e=>{if(e.target.files[0])handleImport(e.target.files[0]);e.target.value="";};

/* ----- tema claro/escuro (escuro por padrão) ----- */
function applyTheme(t){
  document.documentElement.setAttribute("data-theme",t);
  const b=document.getElementById("btnTheme");if(b)b.textContent=t==="light"?"🌙":"☀";
  const meta=document.querySelector('meta[name="theme-color"]');if(meta)meta.setAttribute("content",t==="light"?"#eef1f5":"#0B0D12");
  try{localStorage.setItem("richard_theme",t);}catch(e){}
}
let _theme="dark";try{_theme=localStorage.getItem("richard_theme")||"dark";}catch(e){}
applyTheme(_theme);
topUpSeries(); // mantém os horários fixos sempre preenchidos para as próximas semanas
topUpVelSeries(); // idem para as vacações Velocity recorrentes
document.getElementById("btnTheme").onclick=()=>applyTheme(document.documentElement.getAttribute("data-theme")==="light"?"dark":"light");

render();
</script>
